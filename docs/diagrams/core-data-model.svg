 x="1478.65" y="941.2266">name = "Proximala humerusfraktur"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="343.5986" x="1478.65" y="956.3594">parentTemplateId links to source template if derived</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.7334" x="1478.65" y="971.4922">derivedAt stores last sync timestamp from parent</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="185" id="ent0036"><path d="M1897.25,906.4669 L1897.25,992.1309 L2369.3081,992.1309 L2369.3081,916.4669 L2359.3081,906.4669 L1897.25,906.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2359.3081,906.4669 L2359.3081,916.4669 L2369.3081,916.4669 L2359.3081,906.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.7788" x="1903.25" y="923.5338">Example:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.397" x="1903.25" y="938.6666">label = "Vecka 4 - fysiokontroll"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.5742" x="1903.25" y="953.7994">offsetDays = 28, windowDays = 7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="451.0581" x="1903.25" y="968.9322">scoreAliases = {"PNRS_2":"PNRS_week4", "OSS.total":"OSS_week4"}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.8643" x="1903.25" y="984.065">dashboardCategory = SUBACUTE</text></g><g class="entity" data-qualified-name="GMN38" data-source-line="193" id="ent0039"><path d="M1069.51,1159.4669 L1069.51,1245.1309 L1412.6472,1245.1309 L1412.6472,1169.4669 L1402.6472,1159.4669 L1069.51,1159.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1402.6472,1159.4669 L1402.6472,1169.4669 L1412.6472,1169.4669 L1402.6472,1159.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.7788" x="1075.51" y="1176.5338">Example:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.9834" x="1075.51" y="1191.6666">grantedAt = "2026-03-08T14:30:45.123Z"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.1372" x="1075.51" y="1206.7994">revokedAt = null (active) or timestamp (revoked)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4009" x="1075.51" y="1221.9322">One active consent per patient+module+journey</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.9214" x="1075.51" y="1237.065">Revoked records are kept for audit trail</text></g><g class="entity" data-qualified-name="GMN41" data-source-line="201" id="ent0042"><path d="M600.8,78.8969 L600.8,179.6937 L994.4899,179.6937 L994.4899,88.8969 L984.4899,78.8969 L600.8,78.8969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M984.4899,78.8969 L984.4899,88.8969 L994.4899,88.8969 L984.4899,78.8969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.2373" x="606.8" y="95.9638">Follow-up trigger semantics:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.7925" x="606.8" y="111.0966">JourneyTemplateEntry defines a due follow-up point.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="372.6899" x="606.8" y="126.2294">When a form is submitted, FormResponse may reference</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.2695" x="606.8" y="141.3622">patientJourneyId and journeyStepId.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="358.2363" x="606.8" y="156.495">Submission updates Case.triggers and policyWarnings,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.7573" x="606.8" y="171.6278">which then drive staff triage decisions.</text></g><g class="entity" data-qualified-name="GMN44" data-source-line="210" id="ent0045"><path d="M585.78,215.1669 L585.78,255.4325 L1009.5071,255.4325 L1009.5071,225.1669 L999.5071,215.1669 L585.78,215.1669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M999.5071,215.1669 L999.5071,225.1669 L1009.5071,225.1669 L999.5071,215.1669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195.5078" x="591.78" y="232.2338">Simplified ERD for readability.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="402.7271" x="591.78" y="247.3666">Some optional UI/audit helper fields are intentionally omitted.</text></g><!--link Patient to Case--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="association" data-source-line="147" id="lnk18"><path codeLine="147" d="M150.94,348.2969 C170.3,348.2969 191.44,348.2969 210.48,348.2969" fill="none" id="Patient-Case" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22.9785" x="181.71" y="361.3638">has</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="158.8866" y="361.2386">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="196.0716" y="363.5308">*</text></g><!--link Patient to PatientJourne