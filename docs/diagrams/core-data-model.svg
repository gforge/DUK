"spacing" textLength="343.5986" x="1544.34" y="1518.3594">parentTemplateId links to source template if derived</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.7334" x="1544.34" y="1533.4922">derivedAt stores last sync timestamp from parent</text></g><g class="entity" data-qualified-name="GMN45" data-source-line="238" id="ent0046"><path d="M1962.94,1468.4669 L1962.94,1554.1309 L2434.9981,1554.1309 L2434.9981,1478.4669 L2424.9981,1468.4669 L1962.94,1468.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2424.9981,1468.4669 L2424.9981,1478.4669 L2434.9981,1478.4669 L2424.9981,1468.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.7788" x="1968.94" y="1485.5338">Example:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.397" x="1968.94" y="1500.6666">label = "Vecka 4 - fysiokontroll"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.5742" x="1968.94" y="1515.7994">offsetDays = 28, windowDays = 7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="451.0581" x="1968.94" y="1530.9322">scoreAliases = {"PNRS_2":"PNRS_week4", "OSS.total":"OSS_week4"}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.8643" x="1968.94" y="1546.065">dashboardCategory = SUBACUTE</text></g><g class="entity" data-qualified-name="GMN48" data-source-line="246" id="ent0049"><path d="M1135.2,1721.4669 L1135.2,1807.1309 L1478.3372,1807.1309 L1478.3372,1731.4669 L1468.3372,1721.4669 L1135.2,1721.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1468.3372,1721.4669 L1468.3372,1731.4669 L1478.3372,1731.4669 L1468.3372,1721.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.7788" x="1141.2" y="1738.5338">Example:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.9834" x="1141.2" y="1753.6666">grantedAt = "2026-03-08T14:30:45.123Z"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.1372" x="1141.2" y="1768.7994">revokedAt = null (active) or timestamp (revoked)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4009" x="1141.2" y="1783.9322">One active consent per patient+module+journey</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.9214" x="1141.2" y="1799.065">Revoked records are kept for audit trail</text></g><g class="entity" data-qualified-name="GMN51" data-source-line="254" id="ent0052"><path d="M666.49,197.8969 L666.49,298.6937 L1060.1799,298.6937 L1060.1799,207.8969 L1050.1799,197.8969 L666.49,197.8969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1050.1799,197.8969 L1050.1799,207.8969 L1060.1799,207.8969 L1050.1799,197.8969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.2373" x="672.49" y="214.9638">Follow-up trigger semantics:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.7925" x="672.49" y="230.0966">JourneyTemplateEntry defines a due follow-up point.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="372.6899" x="672.49" y="245.2294">When a form is submitted, FormResponse may reference</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="301.7866" x="672.49" y="260.3622">patientJourneyId and journeyTemplateEntryId.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="358.2363" x="672.49" y="275.495">Submission updates Case.triggers and policyWarnings,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.7573" x="672.49" y="290.6278">which then drive staff triage decisions.</text></g><g class="entity" data-qualified-name="GMN54" data-source-line="263" id="ent0055"><path d="M651.47,334.1669 L651.47,374.4325 L1075.1971,374.4325 L1075.1971,344.1669 L1065.1971,334.1669 L651.47,334.1669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1065.1971,334.1669 L1065.1971,344.1669 L1075.1971,344.1669 L1065.1971,334.1669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195.5078" x="657.47" y="351.2338">Simplified ERD for readability.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="402.7271" x="657.47" y="366.3666">Some optional UI/audit helper fields are intentionally omitted.</text></g><!--link Patient to Case--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="association" data-source-line="191" id="lnk21"><path codeLine="191" d="M162.85,535.1669 C182.05,535.1669 203.01,535.1669 221.94,535.1669" fill="none" id="Patient-Case" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22.9785" x="169.39" y="548.2338">has</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="170.4601" y="549.1392">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="207.8228" y="553.4393">*</text></g><!--link Patient to EpisodeOfCare--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="associati