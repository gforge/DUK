size="13" lengthAdjust="spacing" textLength="343.5986" x="1531.58" y="670.1894">parentTemplateId links to source template if derived</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.7334" x="1531.58" y="685.3222">derivedAt stores last sync timestamp from parent</text></g><g class="entity" data-qualified-name="GMN41" data-source-line="215" id="ent0042"><path d="M1950.18,43.2969 L1950.18,128.9609 L2422.2381,128.9609 L2422.2381,53.2969 L2412.2381,43.2969 L1950.18,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2412.2381,43.2969 L2412.2381,53.2969 L2422.2381,53.2969 L2412.2381,43.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.7788" x="1956.18" y="60.3638">Example:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.397" x="1956.18" y="75.4966">label = "Vecka 4 - fysiokontroll"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.5742" x="1956.18" y="90.6294">offsetDays = 28, windowDays = 7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="451.0581" x="1956.18" y="105.7622">scoreAliases = {"PNRS_2":"PNRS_week4", "OSS.total":"OSS_week4"}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.8643" x="1956.18" y="120.895">dashboardCategory = SUBACUTE</text></g><g class="entity" data-qualified-name="GMN44" data-source-line="223" id="ent0045"><path d="M1122.44,1421.2969 L1122.44,1506.9609 L1465.5772,1506.9609 L1465.5772,1431.2969 L1455.5772,1421.2969 L1122.44,1421.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1455.5772,1421.2969 L1455.5772,1431.2969 L1465.5772,1431.2969 L1455.5772,1421.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.7788" x="1128.44" y="1438.3638">Example:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.9834" x="1128.44" y="1453.4966">grantedAt = "2026-03-08T14:30:45.123Z"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.1372" x="1128.44" y="1468.6294">revokedAt = null (active) or timestamp (revoked)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4009" x="1128.44" y="1483.7622">One active consent per patient+module+journey</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.9214" x="1128.44" y="1498.895">Revoked records are kept for audit trail</text></g><g class="entity" data-qualified-name="GMN47" data-source-line="231" id="ent0048"><path d="M653.73,125.7269 L653.73,226.5238 L1047.4199,226.5238 L1047.4199,135.7269 L1037.4199,125.7269 L653.73,125.7269" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1037.4199,125.7269 L1037.4199,135.7269 L1047.4199,135.7269 L1037.4199,125.7269" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.2373" x="659.73" y="142.7938">Follow-up trigger semantics:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.7925" x="659.73" y="157.9266">JourneyTemplateEntry defines a due follow-up point.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="372.6899" x="659.73" y="173.0594">When a form is submitted, FormResponse may reference</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="301.7866" x="659.73" y="188.1922">patientJourneyId and journeyTemplateEntryId.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="358.2363" x="659.73" y="203.325">Submission updates Case.triggers and policyWarnings,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.7573" x="659.73" y="218.4578">which then drive staff triage decisions.</text></g><g class="entity" data-qualified-name="GMN50" data-source-line="240" id="ent0051"><path d="M638.72,261.9969 L638.72,302.2625 L1062.4471,302.2625 L1062.4471,271.9969 L1052.4471,261.9969 L638.72,261.9969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1052.4471,261.9969 L1052.4471,271.9969 L1062.4471,271.9969 L1052.4471,261.9969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195.5078" x="644.72" y="279.0638">Simplified ERD for readability.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="402.7271" x="644.72" y="294.1966">Some optional UI/audit helper fields are intentionally omitted.</text></g><!--link Patient to Case--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="association" data-source-line="172" id="lnk20"><path codeLine="172" d="M150.94,634.1269 C170.3,634.1269 191.44,634.1269 210.48,634.1269" fill="none" id="Patient-Case" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22.9785" x="157.71" y="647.1938">has</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="158.5014" y="648.1325">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="196.0716" y="649.3608">*</text></g><!--link Patient to PatientJourney--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="associ