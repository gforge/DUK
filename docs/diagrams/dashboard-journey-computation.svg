<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="897px" preserveAspectRatio="none" style="width:468px;height:897px;background:#FFFFFF;" version="1.1" viewBox="0 0 468 897" width="468px" zoomAndPan="magnify"><title>Dashboard Due-Step Computation &#8212; Activity Diagram</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="425.8174" x="20" y="32.9951">Dashboard Due-Step Computation &#8212; Activity Diagram</text></g><ellipse cx="234.4087" cy="57.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="170.3105" x="149.2534" y="87.2969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="150.3105" x="159.2534" y="108.4355">Load patients &amp; journeys</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="230.9668" x="118.9253" y="141.2656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.5996" x="128.9253" y="162.4043">For each patient: collect</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.0996" x="128.9253" y="176.373">ALL PatientJourney records</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210.9668" x="128.9253" y="190.3418">(may be multiple parallel journeys)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="257.4219" x="105.6978" y="223.1719"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.1563" x="115.6978" y="244.3105">For each ACTIVE journey:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="103.8398" x="115.6978" y="258.2793">Apply pause shift</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="237.4219" x="115.6978" y="272.248">(totalPausedDays + currentPauseDays)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="211.291" x="128.7632" y="305.0781"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="191.291" x="138.7632" y="326.2168">Apply modifications per journey</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.8555" x="138.7632" y="340.1855">(ADD_STEP, REMOVE_STEP,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="120.7441" x="138.7632" y="354.1543">SWITCH_TEMPLATE)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="190.2676" x="139.2749" y="386.9844"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151.6934" x="149.2749" y="408.123">Overlay research module</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.2676" x="149.2749" y="422.0918">entries if researchModuleIds</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.3633" x="149.2749" y="436.0605">are present</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="239.7617" x="114.5278" y="468.8906"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="219.7617" x="124.5278" y="490.0293">Compute effective steps per journey</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.1777" x="124.5278" y="503.998">(getEffectiveSteps)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="187.7363" x="140.5405" y="536.8281"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.7363" x="150.5405" y="557.9668">Resolve patient instructions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="155.5195" x="150.5405" y="571.9355">from persisted Instruction</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="45.0586" x="150.5405" y="585.9043">records</text><rect fill="#F1F1F1" height="75.875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="213.6582" x="127.5796" y="618.7344"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="187.6465" x="137.5796" y="639.873">Merge &amp; deduplicate due steps</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.0918" x="137.5796" y="653.8418">across parallel journeys by</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="97.2539" x="137.5796" y="667.8105">templateEntryId</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.6582" x="137.5796" y="681.7793">(getMergedDueStepsForPatient)</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="147.6465" x="160.5854" y="714.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="127.6465" x="170.5854" y="735.748">Map merged steps to</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.6699" x="170.5854" y="749.7168">queue/category</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="182.9668" x="142.9253" y="782.5469"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.9668" x="152.9253" y="803.6855">Build dashboard Case rows</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.6777" x="152.9253" y="817.6543">with computed category</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="80.5078" x="152.9253" y="831.623">and nextStep</text><ellipse cx="234.4087" cy="875.4531" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="234.4087" cy="875.4531" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="234.4087" x2="234.4087" y1="67.2969" y2="87.2969"/><polygon fill="#181818" points="230.4087,77.2969,234.4087,87.2969,238.4087,77.2969,234.4087,81.2969" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="234.4087" x2="234.4087" y1="121.2656" y2="141.2656"/><polygon fill="#181818" points="230.4087,131.2656,234.4087,141.2656,238.4087,131.2656,234.4087,135.2656" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="234.4087" x2="234.4087" y1="203.1719" y2="223.1719"/><polygon fill="#181818" points="230.4087,213.1719,234.4087,223.1719,238.4087,213.1719,234.4087,217.1719" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="234.4087" x2="234.4087" y1="285.0781" y2="305.0781"/><polygon fill="#181818" points="230.4087,295.0781,234.4087,305.0781,238.4087,295.0781,234.4087,299.0781" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="234.4087" x2="234.4087" y1="366.9844" y2="386.9844"/><polygon fill="#181818" points="230.4087,376.9844,234.4087,386.9844,238.4087,376.9844,234.4087,380.9844" style="stroke:#181818;stroke-width:1;