)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="185.8555" x="104.1738" y="277.1406"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="118.4238" x="114.1738" y="298.2793">Apply modifications</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.8555" x="114.1738" y="312.248">(ADD_STEP, REMOVE_STEP,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="120.7441" x="114.1738" y="326.2168">SWITCH_TEMPLATE)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="190.2676" x="101.9678" y="359.0469"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151.6934" x="111.9678" y="380.1855">Overlay research module</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.2676" x="111.9678" y="394.1543">entries if researchModuleIds</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.3633" x="111.9678" y="408.123">are present</text><rect fill="#F1F1F1" height="75.875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="204.1953" x="95.0039" y="440.9531"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.2031" x="105.0039" y="462.0918">Hydrate instructions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="184.1953" x="105.0039" y="476.0605">(resolve instructionTemplateId</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="104.7715" x="105.0039" y="490.0293">&#8594; content, or use</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.7988" x="105.0039" y="50