<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="911px" preserveAspectRatio="none" style="width:394px;height:911px;background:#FFFFFF;" version="1.1" viewBox="0 0 394 911" width="394px" zoomAndPan="magnify"><title>Dashboard / Journey Computation &#8212; Activity</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="351.2031" x="20" y="32.9951">Dashboard / Journey Computation &#8212; Activity</text></g><ellipse cx="197.1016" cy="57.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="170.3105" x="111.9463" y="87.2969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="150.3105" x="121.9463" y="108.4355">Load patients &amp; journeys</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="230.9668" x="81.6182" y="141.2656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.5996" x="91.6182" y="162.4043">For each patient: collect</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.0996" x="91.6182" y="176.373">ALL PatientJourney records</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210.9668" x="91.6182" y="190.3418">(may be multiple parallel journeys)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="257.4219" x="68.3906" y="223.1719"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.1563" x="78.3906" y="244.3105">For each ACTIVE journey:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="103.8398" x="78.3906" y="258.2793">Apply pause shift</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="237.4219" x="78.3906" y="272.248">(totalPausedDays + currentPauseDays)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="211.291" x="91.4561" y="305.0781"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="191.291" x="101.4561" y="326.2168">Apply modifications per journey</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.8555" x="101.4561" y="340.1855">(ADD_STEP, REMOVE_STEP,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="120.7441" x="101.4561" y="354.1543">SWITCH_TEMPLATE)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="190.2676" x="101.9678" y="386.9844"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151.6934" x="111.9678" y="408.123">Overlay research module</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.2676" x="111.9678" y="422.0918">entries if researchModuleIds</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.3633" x="111.9678" y="436.0605">are present</text><rect fill="#F1F1F1" height="75.875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="204.1953" x="95.0039" y="468.8906"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.2031" x="105.0039" y="490.0293">Hydrate instructions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="184.1953" x="105.0039" y="503.998">(resolve instructionTemplateId</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="104.7715" x="105.0039" y="517.9668">&#8594; content, or use</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.7988" x="105.0039" y="531.9355">instructionText fallback)</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="239.7617" x="77.2207" y="564.7656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="219.7617" x="87.2207" y="585.9043">Compute effective steps per journey</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.1777" x="87.2207" y="599.873">(getEffectiveSteps)</text><rect fill="#F1F1F1" height="75.875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="213.6582" x="90.2725" y="632.7031"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="187.6465" x="100.2725" y="653.8418">Merge &amp; deduplicate due steps</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.0918" x="100.2725" y="667.8105">across parallel journeys by</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="97.2539" x="100.2725" y="681.7793">templateEntryId</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.6582" x="100.2725" y="695.748">(getMergedDueStepsForPatient)</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="147.6465" x="123.2783" y="728.5781"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="127.6465" x="133.2783" y="749.7168">Map merged steps to</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.6699" x="133.2783" y="763.6855">queue/category</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="182.9668" x="105.6182" y="796.5156"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.9668" x="115.6182" y="817.6543">Build dashboard Case rows</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.6777" x="115.6182" y="831.623">with computed category</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="80.5078" x="115.6182" y="845.5918">and nextStep</text><ellipse cx="197.1016" cy="889.4219" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="197.1016" cy="889.4219" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="197.1016" x2="197.1016" y1="67.2969" y2="87.2969"/><polygon fill="#181818" points="193.1016,77.2969,197.1016,87.2969,201.1016,77.2969,197.1016,81.2969" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="197.1016" x2="197.1016" y1="121.2656" y2="141.2656"/><polygon fill="#181818" points="193.1016,131.2656,197.1016,141.2656,201.1016,131.2656,197.1016,135.2656" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="197.1016" x2="197.1016" y1="203.1719" y2="223.1719"/><polygon fill="#181818" points="193.1016,213.1719,197.1016,223.1719,201.1016,213.1719,197.1016,217.1719" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="197.1016" x2="197.1016" y1="285.0781" y2="305.0781"/><polygon fill="#181818" points="193.1016,295.0781,197.1016,305.0781,201.1016,295.0781,197.1016,299.0781" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="197.1016" x2="197.1016" y1="366.9844" y2="386.9