<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="883px" preserveAspectRatio="none" style="width:460px;height:883px;background:#FFFFFF;" version="1.1" viewBox="0 0 460 883" width="460px" zoomAndPan="magnify"><title>Dashboard Due-Step Computation - Activity Diagram</title><defs/><g><g class="title" data-source-line="6"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="417.6279" x="20" y="32.9951">Dashboard Due-Step Computation - Activity Diagram</text></g><ellipse cx="230.314" cy="57.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="170.3105" x="145.1587" y="87.2969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="150.3105" x="155.1587" y="108.4355">Load patients &amp; journeys</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="230.9668" x="114.8306" y="141.2656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.5996" x="124.8306" y="162.4043">For each patient: collect</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.0996" x="124.8306" y="176.373">ALL PatientJourney records</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210.9668" x="124.8306" y="190.3418">(may be multiple parallel journeys)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="257.4219" x="101.603" y="223.1719"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.0742" x="111.603" y="244.3105">For each ACTIVE/SUSPENDED journey:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="103.8398" x="111.603" y="258.2793">Apply pause shift</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="237.4219" x="111.603" y="272.248">(totalPausedDays + currentPauseDays)</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="211.291" x="124.6685" y="305.0781"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="191.291" x="134.6685" y="326.2168">Apply modifications per journey</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.7227" x="134.6685" y="340.1855">(ADD_STEP, REMOVE_STEP)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="190.2676" x="135.1802" y="373.0156"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151.6934" x="145.1802" y="394.1543">Overlay research module</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.2676" x="145.1802" y="408.123">entries if researchModuleIds</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.3633" x="145.1802" y="422.0918">are present</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="239.7617" x="110.4331" y="454.9219"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="219.7617" x="120.4331" y="476.0605">Compute effective steps per journey</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.1777" x="120.4331" y="490.0293">(getEffectiveSteps)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="187.7363" x="136.4458" y="522.8594"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.7363" x="146.4458" y="543.998">Resolve patient instructions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="155.5195" x="146.4458" y="557.9668">from persisted Instruction</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="45.0586" x="146.4458" y="571.9355">records</text><rect fill="#F1F1F1" height="75.875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="213.6582" x="123.4849" y="604.7656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="187.6465" x="133.4849" y="625.9043">Merge &amp; deduplicate due steps</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.0918" x="133.4849" y="639.873">across parallel journeys by</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.3262" x="133.4849" y="653.8418">templateId</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.6582" x="133.4849" y="667.8105">(getMergedDueStepsForPatient)</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="147.6465" x="156.4907" y="700.6406"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="127.6465" x="166.4907" y="721.7793">Map merged steps to</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.6699" x="166.4907" y="735.748">queue/category</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="182.9668" x="138.8306" y="768.5781"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.9668" x="148.8306" y="789.7168">Build dashboard Case rows</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.6777" x="148.8306" y="803.6855">with computed category</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="80.5078" x="148.8306" y="817.6543">and nextStep</text><ellipse cx="230.314" cy="861.4844" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="230.314" cy="861.4844" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="230.314" x2="230.314" y1="67.2969" y2="87.2969"/><polygon fill="#181818" points="226.314,77.2969,230.314,87.2969,234.314,77.2969,230.314,81.2969" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="230.314" x2="230.314" y1="121.2656" y2="141.2656"/><polygon fill="#181818" points="226.314,131.2656,230.314,141.2656,234.314,131.2656,230.314,135.2656" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="230.314" x2="230.314" y1="203.1719" y2="223.1719"/><polygon fill="#181818" points="226.314,213.1719,230.314,223.1719,234.314,213.1719,230.314,217.1719" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="230.314" x2="230.314" y1="285.0781" y2="305.0781"/><polygon fill="#181818" points="226.314,295.0781,230.314,305.0781,234.314,295.0781,230.314,299.0781" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="230.314" x2="230.314" y1="353.0156" y2="373.0156"/><polygon fill="#181818" points="226.314,363.0156,230.314,373.0156,234.314,363.0156,230.314,367.0156" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="230.314" x2="230.314" y1="434.9219" y2="454.9219"/><polygon fill="#181818" points="226.314,444.9219,230.314,454.9219,234.314,444.9219,230.314,448.