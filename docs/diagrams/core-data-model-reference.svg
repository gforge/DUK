<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="272px" preserveAspectRatio="none" style="width:2218px;height:272px;background:#FFFFFF;" version="1.1" viewBox="0 0 2218 272" width="2218px" zoomAndPan="magnify"><title>Core Data Model - Reference</title><defs/><g><g class="title" data-source-line="8"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="226.6934" x="988.9775" y="22.9951">Core Data Model - Reference</text></g><g class="legend" data-source-line="14"><rect fill="#DDDDDD" height="111.7813" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="289.125" x="957.7616" y="49.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="59.9238" x="967.2118" y="69.292">Notation</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="59.7939" x="1067.7958" y="69.292">Meaning</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="37.6387" x="967.2118" y="85.5889">field?</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.0615" x="1067.7958" y="85.5889">Optional/nullable field</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="41.1318" x="967.2118" y="101.8857">field[]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.8906" x="1067.7958" y="101.8857">Array/list field</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="20.0156" x="967.2118" y="118.1826">*Id</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="169.6406" x="1067.7958" y="118.1826">Identifier reference field</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="90.0293" x="967.2118" y="134.4795">YYYY-MM-DD</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="85.3604" x="1067.7958" y="134.4795">Anchor date</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="91.6836" x="967.2118" y="150.7764">ISO datetime</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="144.2451" x="1067.7958" y="150.7764">Persisted timestamp</text><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="1241.8866" y1="56.2969" y2="56.2969"/><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="1241.8866" y1="72.5938" y2="72.5938"/><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="1241.8866" y1="88.8906" y2="88.8906"/><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="1241.8866" y1="105.1875" y2="105.1875"/><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="1241.8866" y1="121.4844" y2="121.4844"/><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="1241.8866" y1="137.7813" y2="137.7813"/><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="1241.8866" y1="154.0781" y2="154.0781"/><line style="stroke:#000000;stroke-width:1;" x1="962.7616" x2="962.7616" y1="56.2969" y2="154.0781"/><line style="stroke:#000000;stroke-width:1;" x1="1063.3456" x2="1063.3456" y1="56.2969" y2="154.0781"/><line style="stroke:#000000;stroke-width:1;" x1="1241.8866" x2="1241.8866" y1="56.2969" y2="154.0781"/></g><g class="entity" data-qualified-name="JourneyTemplateRef" data-source-line="24" id="ent0002"><path d="M6,187.6381 L6,258.1694 L379.0156,258.1694 L379.0156,197.6381 L369.0156,187.6381 L6,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M369.0156,187.6381 L369.0156,197.6381 L379.0156,197.6381 L369.0156,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="110.8301" x="12" y="204.705">JourneyTemplate</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.4531" x="12" y="219.8378">- parentTemplateId?: lineage to parent template</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="266.0938" x="12" y="234.9706">- derivedAt?: last parent sync timestamp</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="352.0156" x="12" y="250.1035">- referenceDateLabel: visible assignment anchor label</text></g><g class="entity" data-qualified-name="JourneyEntryRef" data-source-line="31" id="ent0003"><path d="M439.02,187.6381 L439.02,258.1694 L843.2724,258.1694 L843.2724,197.6381 L833.2724,187.6381 L439.02,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M833.2724,187.6381 L833.2724,197.6381 L843.2724,197.6381 L833.2724,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.4185" x="445.02" y="204.705">JourneyTemplateEntry</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.043" x="445.02" y="219.8378">- offsetDays + windowDays drive due windows</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="383.2524" x="445.02" y="234.9706">- scoreAliases maps raw score keys to stable policy aliases</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="363.9429" x="445.02" y="250.1035">- recurrenceIntervalDays enables recurring occurrences</text></g><g class="entity" data-qualified-name="FormResponseRef" data-source-line="38" id="ent0004"><path d="M903.27,187.6381 L903.27,258.1694 L1277.2886,258.1694 L1277.2886,197.6381 L1267.2886,187.6381 L903.27,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1267.2886,187.6381 L1267.2886,197.6381 L1277.2886,197.6381 L1267.2886,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.459" x="909.27" y="204.705">FormResponse</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.6499" x="909.27" y="219.8378">- patientJourneyId?: runtime journey context</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.0186" x="909.27" y="234.9706">- journeyTemplateEntryId?: originating template entry</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.4653" x="909.27" y="250.1035">- occurrenceIndex?: recurring instance index</text></g><g class="entity" data-qualified-name="ConsentRef" data-source-line="45" id="ent0005"><path d="M1862.43,180.0781 L1862.43,265.7422 L2211.6483,265.7422 L2211.6483,190.0781 L2201.6483,180.0781 L1862.43,180.0781" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2201.6483,180.0781 L2201.6483,190.0781 L2211.6483,190.0781 L2201.6483,180.0781" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="53.3774" x="1868.43" y="197.145">Consent</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.2183" x="1868.43" y="212.2778">- grantedAt / grantedByUserId always set on grant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.2969" x="1868.43" y="227.4106">- revokedAt / revokedByUserId set on revoke</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.9453" x="1868.43" y="242.5435">- one active consent per patient+module+journey</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.7695" x="1868.43" y="257.6763">- revoked records are retained for audit history</text></g><g class="entity" data-qualified-name="InstructionRef" data-source-line="53" id="ent0006"><path d="M1337.29,187.6381 L1337.29,258.1694 L1802.4355,258.1694 L1802.4355,197.6381 L1792.4355,187.6381 L1337.29,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1792.4355,187.6381 L1792.4355,197.6381 L1802.4355,197.6381 L1792.4355,187.6381" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="69.5767" x="1343.29" y="204.705">Instruction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.8564" x="1343.29" y="219.8378">- startDayOffset/endDayOffset stored from template</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.1396" x="1343.29" y="234.9706">- startAt/endAt persisted and shifted on journey resume</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="444.1455" x="1343.29" y="250.1035">- status: ACTIVE -&gt; ACKNOWLEDGED -&gt; COMPLETED or CANCELLED</text></g><!--link JourneyTemplateRef to JourneyEntryRef--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="association" data-source-line="59" id="lnk7"><path codeLine="59" d="M379.2,222.9081 C398.8,222.9081 418.81,222.9081 438.58,222.9081" fill="none" id="JourneyTemplateRef-JourneyEntryRef" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link JourneyEntryRef to FormResponseRef--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="association" data-source-line="60" id="lnk8"><path codeLine="60" d="M843.7,222.9081 C863.48,222.9