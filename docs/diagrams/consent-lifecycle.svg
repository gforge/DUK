<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="767px" preserveAspectRatio="none" style="width:437px;height:767px;background:#FFFFFF;" version="1.1" viewBox="0 0 437 767" width="437px" zoomAndPan="magnify"><title>Research Consent Lifecycle &#8212; State Diagram</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="353.999" x="34.9116" y="22.9951">Research Consent Lifecycle &#8212; State Diagram</text></g><g class="entity" data-qualified-name="GRANTED" id="ent0002"><rect fill="#F1F1F1" height="52.5938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="88.8037" x="7.42" y="254.4069"/><line style="stroke:#181818;stroke-width:0.5;" x1="7.42" x2="96.2237" y1="297.0006" y2="297.0006"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.8037" x="17.42" y="272.402">GRANTED</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="53.4775" x="17.42" y="288.6989">(active)</text></g><g class="entity" data-qualified-name="REVOKED" id="ent0003"><rect fill="#F1F1F1" height="52.5938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="89.6514" x="7" y="530.0269"/><line style="stroke:#181818;stroke-width:0.5;" x1="7" x2="96.6514" y1="572.6206" y2="572.6206"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.9766" x="17" y="548.022">REVOKED</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="69.6514" x="17" y="564.3189">(terminal)</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="6" id="ent0002"><ellipse cx="51.83" cy="53.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="end_entity" data-qualified-name=".end." data-source-line="10" id="ent0005"><ellipse cx="48.83" cy="733.2569" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="48.83" cy="733.2569" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="13" id="ent0003"><path d="M130.83,230.2969 L130.83,276.6969 L96.55,280.6969 L130.83,284.6969 L130.83,331.0938 A0,0 0 0 0 130.83,331.0938 L430.8222,331.0938 A0,0 0 0 0 430.8222,331.0938 L430.8222,240.2969 L420.8222,230.2969 L130.83,230.2969 A0,0 0 0 0 130.83,230.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M420.8222,230.2969 L420.8222,240.2969 L430.8222,240.2969 L420.8222,230.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.5083" x="136.83" y="247.3638">Idempotency:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.9482" x="136.83" y="262.4966">If an active Consent already exists</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.9922" x="136.83" y="277.6294">for the same (patientId, researchModuleId,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.4316" x="136.83" y="292.7622">patientJourneyId), grantConsent returns</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.708" x="136.83" y="307.895">the existing record without creating</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="76.4067" x="136.83" y="323.0278">a duplicate.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="22" id="ent0006"><path d="M135.68,468.0969 L135.68,644.5578 L373.9793,644.5578 L373.9793,478.0969 L363.9793,468.0969 L135.68,468.0969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M363.9793,468.0969 L363.9793,478.0969 L373.9793,478.0969 L363.9793,468.0969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190.5503" x="141.68" y="485.1638">The record is NEVER deleted.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.5771" x="141.68" y="500.2966">revokedAt and revokedByUserId</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.4658" x="141.68" y="515.4294">are set for audit purposes.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.2993" x="141.68" y="530.5622">hasActiveConsent() returns false.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="141.68" y="545.695">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.957" x="141.68" y="560.8278">A new call to grantConsent</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.6763" x="141.68" y="575.9606">after revocation creates a</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.7466" x="141.68" y="591.0935">fresh Consent record.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197.6343" x="141.68" y="606.2263">Both the revoked and the new</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.2515" x="141.68" y="621.3591">record are preserved in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.0342" x="141.68" y="636.4919">AppState.researchConsents.</text></g><g class="entity" data-qualified-name="GMN8" data-source-line="36" id="ent0009"><path d="M95.25,705.5569 L95.25,760.9553 L418.3921,760.9553 L418.3921,715.5569 L408.3921,705.5569 L95.25,705.5569" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M408.3921,705.5569 L408.3921,715.5569 L418.3921,715.5569 L408.3921,705.5569" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.3232" x="101.25" y="722.6238">Service: src/api/service/researchConsents.ts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.4214" x="101.25" y="737.7566">Storage: AppState.researchConsents[]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.1421" x="101.25" y="752.8894">UI: src/components/journey/ConsentDialog.tsx</text></g><!--link *start* to GRANTED--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="6" id="lnk3"><path d="M51.83,63.6969 C51.83,96.1069 51.83,197.9569 51.83,247.9069" fill="none" id="*start*-to-GRANTED" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="51.83,253.9069,55.83,244.9069,51.83,248.9069,47.83,244.9069,51.83,253.9069" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.3486" x="70.4384" y="106.3638">grantConsent(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="62.48" x="90.005" y="121.4966">patientId,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120.3008" x="61.0946" y="136.6294">researchModuleId,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111.7822" x="65.3539" y="151.7622">patientJourneyId,</text><text fill="#00000